name: Publish to crates.io

on:
  release:
    types: [published]
  # Also trigger on manual tag push (for emergency releases outside release-please).
  push:
    tags: ['v*', 'djvu-rs-v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. v0.6.0)'
        required: true

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    name: Validate release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Resolve ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PUBLISH_REF="${{ inputs.tag }}"
          elif [ "${{ github.event_name }}" = "release" ]; then
            PUBLISH_REF="${{ github.event.release.tag_name }}"
          else
            PUBLISH_REF="${GITHUB_REF_NAME}"
          fi
          echo "PUBLISH_REF=$PUBLISH_REF" >> "$GITHUB_ENV"

      - uses: actions/checkout@v6
        with:
          ref: ${{ env.PUBLISH_REF }}

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Verify version matches tag
        run: |
          VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)
          TAG="${PUBLISH_REF#djvu-rs-v}"
          TAG="${TAG#v}"
          if [ "$VERSION" != "$TAG" ]; then
            echo "::error::Cargo.toml version ($VERSION) does not match tag (v$TAG)"
            exit 1
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          ZP_VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' crates/djvu-zp/Cargo.toml | head -1)
          echo "ZP_VERSION=$ZP_VERSION" >> "$GITHUB_ENV"

      - name: Install cargo-nextest
        uses: taiki-e/install-action@cargo-nextest

      - name: Run tests
        # Mirrors the CI Test (stable) job on main — the `cli` feature gates
        # the `djvu` binary that several integration tests need.
        run: cargo nextest run --profile ci --workspace --exclude djvu-py --features cli

      - name: Check package for djvu-zp
        run: cargo package -p djvu-zp --allow-dirty

  publish:
    name: Publish
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: validate
    environment: crates-io
    steps:
      - name: Resolve ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PUBLISH_REF="${{ inputs.tag }}"
          elif [ "${{ github.event_name }}" = "release" ]; then
            PUBLISH_REF="${{ github.event.release.tag_name }}"
          else
            PUBLISH_REF="${GITHUB_REF_NAME}"
          fi
          echo "PUBLISH_REF=$PUBLISH_REF" >> "$GITHUB_ENV"

      - uses: actions/checkout@v6
        with:
          ref: ${{ env.PUBLISH_REF }}

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          save-if: false

      - name: Verify version matches tag
        run: |
          VERSION_FROM_MANIFEST=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)
          ZP_VERSION_FROM_MANIFEST=$(sed -n 's/^version = "\(.*\)"/\1/p' crates/djvu-zp/Cargo.toml | head -1)
          TAG="${PUBLISH_REF#djvu-rs-v}"
          TAG="${TAG#v}"
          if [ "$VERSION_FROM_MANIFEST" != "$TAG" ]; then
            echo "::error::Cargo.toml version ($VERSION_FROM_MANIFEST) does not match tag (v$TAG)"
            exit 1
          fi
          echo "VERSION=$VERSION_FROM_MANIFEST" >> "$GITHUB_ENV"
          echo "ZP_VERSION=$ZP_VERSION_FROM_MANIFEST" >> "$GITHUB_ENV"

      # djvu-zp is published first; djvu-rs depends on it.
      - name: Check if djvu-zp already published
        run: |
          if cargo info "djvu-zp@$ZP_VERSION" --registry crates-io >/dev/null 2>&1; then
            echo "ZP_ALREADY_PUBLISHED=true" >> "$GITHUB_ENV"
            echo "djvu-zp $ZP_VERSION already on crates.io — skipping."
          else
            echo "ZP_ALREADY_PUBLISHED=false" >> "$GITHUB_ENV"
          fi

      - name: Publish djvu-zp to crates.io
        if: env.ZP_ALREADY_PUBLISHED == 'false'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p djvu-zp --no-verify

      - name: Wait for djvu-zp to appear in the index
        if: env.ZP_ALREADY_PUBLISHED == 'false'
        run: |
          for i in $(seq 1 30); do
            if cargo info "djvu-zp@$ZP_VERSION" --registry crates-io >/dev/null 2>&1; then
              echo "djvu-zp $ZP_VERSION is live."
              exit 0
            fi
            echo "[$i/30] waiting for djvu-zp $ZP_VERSION on crates.io…"
            sleep 10
          done
          echo "::error::djvu-zp $ZP_VERSION did not appear on crates.io within 5 minutes"
          exit 1

      # djvu-rs is the workspace root crate.
      - name: Check if djvu-rs already published
        run: |
          if cargo info "djvu-rs@$VERSION" --registry crates-io >/dev/null 2>&1; then
            echo "ALREADY_PUBLISHED=true" >> "$GITHUB_ENV"
            echo "djvu-rs $VERSION already on crates.io — skipping."
          else
            echo "ALREADY_PUBLISHED=false" >> "$GITHUB_ENV"
          fi

      - name: Dry-run package djvu-rs
        if: env.ALREADY_PUBLISHED == 'false'
        run: cargo package -p djvu-rs --allow-dirty

      - name: Publish djvu-rs to crates.io
        if: env.ALREADY_PUBLISHED == 'false'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p djvu-rs --no-verify
