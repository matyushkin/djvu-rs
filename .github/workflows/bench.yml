name: Benchmarks

on:
  # Track regressions on every PR that touches code or benchmarks.
  pull_request:
    paths:
      - 'src/**'
      - 'benches/**'
      - 'Cargo.toml'
      - 'Cargo.lock'

  # Update the baseline on every merge to main and on every release tag.
  # No path filter here — main pushes are infrequent (one per merged PR)
  # and tags should always produce fresh numbers regardless of what changed.
  push:
    branches: [main]
    tags:
      - 'v*'

  # Allow manual runs (e.g. to seed the initial baseline).
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  bench:
    name: Benchmark
    # Single platform for reproducible comparisons.
    # (macos-latest numbers are kept separately via workflow_dispatch / tags.)
    runs-on: ubuntu-latest

    permissions:
      actions: read         # needed by dawidd6/action-download-artifact to list artifacts
      pull-requests: write  # needed to post the comparison comment

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: bench-ubuntu

      # ── Download baseline from last successful main-branch run (PR only) ────
      - name: Download baseline
        if: github.event_name == 'pull_request'
        uses: dawidd6/action-download-artifact@v6
        with:
          name: bench-baseline
          branch: main
          workflow: bench.yml
          workflow_conclusion: success
          path: baseline
          if_no_artifact_found: warn
        continue-on-error: true

      # ── Run benchmarks ───────────────────────────────────────────────────────
      - name: Bench codecs
        run: cargo bench --bench codecs -- --output-format bencher 2>&1 | tee codec_bench.txt
        continue-on-error: true

      - name: Bench render
        run: cargo bench --bench render -- --output-format bencher 2>&1 | tee render_bench.txt
        continue-on-error: true

      # ── Print summary ────────────────────────────────────────────────────────
      - name: Print results
        run: |
          echo "--- Codec benchmarks ---"
          grep "bench:" codec_bench.txt || echo "(no codec results)"
          echo ""
          echo "--- Render benchmarks ---"
          grep "bench:" render_bench.txt || echo "(no render results)"

      # ── Compare against DjVuLibre ─────────────────────────────────────────
      - name: Install DjVuLibre
        run: sudo apt-get install -y --no-install-recommends libdjvulibre-dev djvulibre-bin
        continue-on-error: true

      - name: Build djvulibre_bench
        run: |
          cc -O2 -o scripts/djvulibre_bench_ci scripts/djvulibre_bench.c \
            $(pkg-config --cflags --libs ddjvuapi) 2>&1 \
            && echo "djvulibre_bench built OK" \
            || echo "djvulibre_bench build FAILED (skipping comparison)"
        continue-on-error: true

      - name: Run DjVuLibre library benchmark
        run: |
          FILE=references/djvujs/library/assets/boy.djvu
          BENCH=scripts/djvulibre_bench_ci
          if [ ! -x "$BENCH" ] || [ ! -f "$FILE" ]; then
            echo "skipped" > djvulibre_bench.txt
            exit 0
          fi
          { "$BENCH" "$FILE" 1 20 72;
            "$BENCH" "$FILE" 1 20 144;
            "$BENCH" "$FILE" 1 20 300; } > djvulibre_bench.txt 2>&1
          cat djvulibre_bench.txt
        continue-on-error: true

      - name: Run ddjvu CLI timing
        run: |
          FILE=references/djvujs/library/assets/boy.djvu
          if ! command -v ddjvu &>/dev/null || [ ! -f "$FILE" ]; then
            echo "skipped" > ddjvu_timing.txt
            exit 0
          fi
          python3 - "$FILE" > ddjvu_timing.txt <<'PYEOF'
          import subprocess, statistics, sys, time
          file = sys.argv[1]
          for dpi in [72, 144, 300]:
              # warm-up
              subprocess.run(["ddjvu", f"-scale={dpi}", "-format=ppm", file, "/dev/null"],
                             capture_output=True)
              times = []
              for _ in range(5):
                  t0 = time.perf_counter()
                  subprocess.run(["ddjvu", f"-scale={dpi}", "-format=ppm", file, "/dev/null"],
                                 capture_output=True)
                  times.append((time.perf_counter() - t0) * 1000)
              print(f"boy.djvu@{dpi}dpi: {statistics.mean(times):.1f} ms")
          PYEOF
          cat ddjvu_timing.txt
        continue-on-error: true

      # ── Compare against baseline and generate Markdown table (PR only) ──────
      - name: Compare benchmarks
        if: github.event_name == 'pull_request'
        id: compare
        run: |
          python3 scripts/bench_compare.py \
            baseline/target/criterion \
            target/criterion \
            > bench_comment.md
          echo "regression_exit=$?" >> "$GITHUB_OUTPUT"
          cat bench_comment.md
        continue-on-error: true  # don't skip comment posting on failure

      - name: Append DjVuLibre comparison
        if: github.event_name == 'pull_request'
        run: |
          python3 scripts/djvulibre_compare.py \
            --criterion target/criterion \
            --djvulibre-bench djvulibre_bench.txt \
            --ddjvu-timing ddjvu_timing.txt \
            >> bench_comment.md 2>/dev/null || true
        continue-on-error: true

      - name: Post benchmark comment
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: bench
          path: bench_comment.md
        continue-on-error: true  # comment failure must not hide regression result

      # Fail the job if the compare script reported regressions.
      - name: Fail on regression
        if: github.event_name == 'pull_request' && steps.compare.outputs.regression_exit == '1'
        run: |
          echo "Benchmark regressions detected — see PR comment for details."
          exit 1

      # ── Upload baseline (main branch + tags) ─────────────────────────────────
      - name: Upload baseline
        if: >
          github.event_name == 'push' &&
          (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
        uses: actions/upload-artifact@v4
        with:
          name: bench-baseline
          # Overwrite the previous baseline so PRs always compare against HEAD of main.
          overwrite: true
          path: target/criterion/
          retention-days: 90

      # ── Always archive full results ──────────────────────────────────────────
      - name: Upload full results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-results-${{ github.sha }}
          path: |
            codec_bench.txt
            render_bench.txt
            djvulibre_bench.txt
            ddjvu_timing.txt
            target/criterion/
          retention-days: 30

  # ── macOS run: tags and manual only (for BENCHMARKS.md) ─────────────────────
  bench-macos:
    name: Benchmark (macOS)
    runs-on: macos-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: bench-macos

      - name: Bench codecs
        run: cargo bench --bench codecs -- --output-format bencher 2>&1 | tee codec_bench.txt
        continue-on-error: true

      - name: Bench render
        run: cargo bench --bench render -- --output-format bencher 2>&1 | tee render_bench.txt
        continue-on-error: true

      - name: Print results
        run: |
          echo "--- Codec benchmarks (macOS) ---"
          grep "bench:" codec_bench.txt || echo "(no codec results)"
          echo ""
          echo "--- Render benchmarks (macOS) ---"
          grep "bench:" render_bench.txt || echo "(no render results)"

      - name: Upload full results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-results-macos-${{ github.sha }}
          path: |
            codec_bench.txt
            render_bench.txt
            target/criterion/
          retention-days: 90
