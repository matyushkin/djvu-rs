[package]
name = "djvu-rs"
version = "0.1.0"
edition = "2024"
rust-version = "1.88"
license = "MIT"
description = "Pure-Rust DjVu decoder written from the DjVu v3 public specification"
repository = "https://github.com/matyushkin/djvu-rs"
documentation = "https://docs.rs/djvu-rs"
readme = "README.md"
keywords = ["djvu", "decoder", "document", "image", "pdf"]
categories = ["parser-implementations", "multimedia::images", "encoding"]
publish = true

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[dependencies]
thiserror = "2"
self_cell = { version = "1.2", optional = true }
# Used by the djvu CLI binary. Will move to a separate djvu-cli crate in v0.2.
clap = { version = "4", features = ["derive"], optional = true }
png = { version = "0.17", optional = true }

[features]
default = ["std"]
std = ["dep:self_cell", "dep:clap", "dep:png"]

[dev-dependencies]
criterion = "0.5"
assert_cmd = "2"
predicates = "3"
tempfile = "3"

[[bin]]
name = "djvu"
path = "src/bin/djvu.rs"
required-features = ["std"]

[[bench]]
name = "codecs"
harness = false

[[bench]]
name = "render"
harness = false

[[bench]]
name = "document"
harness = false
