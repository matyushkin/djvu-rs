[package]
name = "cos-djvu"
version.workspace = true
edition.workspace = true
license = "MIT"
description = "Pure-Rust DjVu decoder written from the DjVu v3 public specification"

[dependencies]
thiserror = "2"
self_cell = "1.2"

[features]
default = ["std"]
std = []

[dev-dependencies]
criterion = { workspace = true }

[[bench]]
name = "codecs"
harness = false

[[bench]]
name = "render"
harness = false
