[graph]
targets = []

[advisories]
version = 2
ignore = []

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CC0-1.0",
    "Zlib",
]
# This crate is MIT. We explicitly disallow GPL/LGPL to protect the
# "no GPL code" guarantee stated in SOURCES.md.
[[licenses.deny]]
id = "GPL-2.0"
[[licenses.deny]]
id = "GPL-3.0"
[[licenses.deny]]
id = "LGPL-2.0"
[[licenses.deny]]
id = "LGPL-2.1"
[[licenses.deny]]
id = "LGPL-3.0"
[[licenses.deny]]
id = "AGPL-3.0"

[bans]
multiple-versions = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
